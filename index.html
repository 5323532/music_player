<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎵 2026 봄학기 음원</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            overflow-y: auto; /* 전체 스크롤 허용 */
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 10px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 100%; 
            max-width: 600px;
            min-height: 90vh; 
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            padding-bottom: 40px;
        }

        /* 상단 플레이어 영역 */
        .player-header {
            padding: 40px 30px 10px 30px;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2em; margin-bottom: 5px;
        }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9em; }

        .player-box {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 20px; padding: 25px; color: white;
            box-shadow: 0 10px 30px rgba(161, 140, 209, 0.4);
        }

        .now-playing { text-align: center; margin-bottom: 20px; }
        .now-playing h2 { font-size: 1.5em; margin-bottom: 5px; word-break: keep-all; line-height: 1.3; }
        
        /* 재생 바 스타일 */
        .progress-container { 
            margin-bottom: 10px; 
            padding: 10px 0;
            cursor: pointer;
        }
        .progress-bar {
            width: 100%; height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px; 
            position: relative; 
            overflow: hidden;
        }
        .progress { height: 100%; background: white; border-radius: 10px; width: 0%; pointer-events: none; }
        .time-display { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.85em; opacity: 0.95; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 25px 0; }
        .control-btn {
            background: white; border: none; width: 55px; height: 55px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; color: #a18cd1; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.play { width: 75px; height: 75px; font-size: 2em; }

        .settings-box {
            display: flex; flex-direction: column; gap: 15px; margin-top: 20px;
        }
        .setting-row {
            display: flex; align-items: center; width: 100%;
        }
        .setting-label {
            width: 60px; min-width: 60px;
            font-size: 0.95em; font-weight: bold; 
            white-space: nowrap; text-align: left;
        }
        .setting-slider {
            flex-grow: 1; accent-color: white; height: 5px; cursor: pointer;
        }
        .setting-value {
            width: 40px; text-align: right; font-size: 0.9em; font-weight: bold;
        }

        /* 탭 고정 (Sticky) */
        .tabs-container {
            position: -webkit-sticky; position: sticky;
            top: 0; z-index: 999;
            background: rgba(255, 255, 255, 0.98);
            padding: 15px 30px;
            border-bottom: 1px solid #eee;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        @media (min-width: 600px) { .tabs-container { border-radius: 30px 30px 0 0; } }

        .tabs { display: flex; gap: 10px; }
        .tab-btn {
            flex: 1; padding: 12px; background: #f5f5f7; border: none;
            border-radius: 12px; font-size: 1em; font-weight: bold; color: #888;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { 
            background: #a18cd1; color: white;
            box-shadow: 0 4px 10px rgba(161, 140, 209, 0.3);
        }

        .playlist { padding: 20px 30px; }
        .song-item {
            background: white; border: 1px solid #eee; padding: 18px 20px; border-radius: 15px;
            margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .song-item:hover { background: #fdfdfd; transform: translateY(-2px); border-color: #ddd; }
        
        .song-item.active { 
            background: rgba(161, 140, 209, 0.08); 
            border: 1px solid #a18cd1; 
        }
        .song-item.active h3 { color: #a18cd1; font-weight: bold; }
        
        .song-info h3 { font-size: 1em; color: #333; margin-bottom: 4px; }
        .song-info p { font-size: 0.85em; color: #888; }
        .song-duration { font-size: 1.1em; color: #ccc; }
        .song-item.active .song-duration { color: #a18cd1; }

        .empty-playlist { text-align: center; padding: 50px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-header">
            <h1>🎵 2026 봄학기</h1>
            <p class="subtitle">Created by 줄래샘</p>

            <div class="player-box">
                <div class="now-playing">
                    <h2 id="currentTitle">파일을 선택하세요</h2>
                    <p id="currentArtist">-</p>
                </div>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="time-display"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
                </div>

                <div class="controls">
                    <button class="control-btn" id="rewindBtn">-3</button>
                    <button class="control-btn play" id="playBtn">▶</button>
                    <button class="control-btn" id="forwardBtn">+10</button>
                </div>

                <div class="settings-box">
                    <div class="setting-row">
                        <span class="setting-label">⚡ 배속</span>
                        <input type="range" class="setting-slider" id="speedSlider" min="1.0" max="1.5" step="0.1" value="1.0">
                        <span class="setting-value" id="speedValue">1.0x</span>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">🔊 볼륨</span>
                        <input type="range" class="setting-slider" id="volumeSlider" min="0" max="100" value="70">
                        <span class="setting-value"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-category="실전모의고사">실전모의고사</button>
                <button class="tab-btn" data-category="리스닝">리스닝</button>
            </div>
        </div>

        <div class="playlist" id="playlist"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        const songsByCategory = {
            "실전모의고사": [
                { title: "Week 2", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week2_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 3", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week3_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 4", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week4_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 5", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week5_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 6", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week6_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 7", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week7_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 8", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week8_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.mp3" }
            ],
            "리스닝": [
                { title: "Week 1 - 수능 미리보기", artist: "리스닝", file: "music/Listening/Week1_수능 미리보기.mp3" },
                { title: "Week 2 - 실전", artist: "리스닝", file: "music/Listening/Week2_실전모의고사.mp3" },
                { title: "Week 2 - 도표", artist: "리스닝", file: "music/Listening/Week2_유형편_도표.mp3" },
                { title: "Week 3 - 실전", artist: "리스닝", file: "music/Listening/Week3_실전모의고사.mp3" },
                { title: "Week 3 - 긴 대화의 응답", artist: "리스닝", file: "music/Listening/Week3_유형편_긴 대화의 응답.mp3" },
                { title: "Week 4 - 실전", artist: "리스닝", file: "music/Listening/Week4_실전모의고사.mp3" },
                { title: "Week 4 - 학교,가정 생활", artist: "리스닝", file: "music/Listening/Week4_유형편_학교,가정 생활.mp3" },
                { title: "Week 5 - 실전", artist: "리스닝", file: "music/Listening/Week5_실전모의고사.mp3" },
                { title: "Week 5 - 문화,사회 생활", artist: "리스닝", file: "music/Listening/Week5_유형편_문화,사회 생활.mp3" },
                { title: "Week 6 - 실전", artist: "리스닝", file: "music/Listening/Week6_실전모의고사.mp3" },
                { title: "Week 6 - 직장 생활", artist: "리스닝", file: "music/Listening/Week6_유형편_직장 생활.mp3" },
                { title: "Week 7 - 실전", artist: "리스닝", file: "music/Listening/Week7_실전모의고사.mp3" },
                { title: "Week 7 - 일상 생활", artist: "리스닝", file: "music/Listening/Week7_유형편_일상 생활.mp3" },
                { title: "Week 8 - 실전", artist: "리스닝", file: "music/Listening/Week8_실전모의고사.mp3" }
            ]
        };

        let currentCategory = "실전모의고사";
        let songs = songsByCategory[currentCategory];
        let currentSongIndex = -1; // 초기 선택 해제
        let isPlaying = false;

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.querySelector('.progress-bar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playlistEl = document.getElementById('playlist');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const volumeSlider = document.getElementById('volumeSlider');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');

        audio.volume = 0.7;

        function displayPlaylist() {
            playlistEl.innerHTML = '';
            if (!songs) {
                playlistEl.innerHTML = '<div class="empty-playlist">목록이 비었습니다</div>';
                return;
            }
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `song-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `<div class="song-info"><h3>${song.title}</h3><p>${song.artist}</p></div><div class="song-duration">♪</div>`;
                item.onclick = () => loadSong(index);
                playlistEl.appendChild(item);
            });
        }

        function loadSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            audio.src = song.file;
            currentTitle.textContent = song.title;
            currentArtist.textContent = song.artist;
            displayPlaylist();
            
            // ★ 클릭 시 즉시 재생 ★
            audio.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸';
            }).catch(error => {
                console.log("Autoplay prevented:", error);
                isPlaying = false;
                playBtn.textContent = '▶';
            });
        }

        function togglePlay() {
            if (!audio.src) { 
                alert("재생할 파일을 먼저 선택해주세요!");
                return; 
            }
            if (isPlaying) { audio.pause(); playBtn.textContent = '▶'; }
            else { audio.play(); playBtn.textContent = '⏸'; }
            isPlaying = !isPlaying;
        }

        playBtn.onclick = togglePlay;
        // 설정해주신 -3초, +10초 유지
        rewindBtn.onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 3); };
        forwardBtn.onclick = () => { if(audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 9); };
        
        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                progress.style.width = `${(audio.currentTime/audio.duration)*100}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
            audio.playbackRate = speedSlider.value;
        });
        audio.addEventListener('ended', () => {
            if(currentSongIndex < songs.length - 1) loadSong(currentSongIndex + 1);
        });

        // 재생 바 클릭 이동 기능
        progressContainer.addEventListener('click', (e) => {
            if(!audio.duration) return; 
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            if (clickX >= 0 && clickX <= width) {
                const percentage = clickX / width;
                audio.currentTime = percentage * audio.duration;
            }
        });

        speedSlider.oninput = (e) => {
            audio.playbackRate = e.target.value;
            speedValue.textContent = e.target.value + 'x';
        };
        volumeSlider.oninput = (e) => { audio.volume = e.target.value / 100; };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 탭 변경
                currentCategory = btn.dataset.category;
                songs = songsByCategory[currentCategory];
                
                // ★ 재생 중단 및 초기화 로직 제거 ★
                // 탭을 바꿔도 노래는 계속 나오게 유지합니다.
                
                // 단, 새로운 목록에서는 선택된 것이 없으므로 하이라이트 해제
                currentSongIndex = -1; 
                
                displayPlaylist();
            };
        });

        displayPlaylist();
    </script>
</body>
</html>
