<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎵 2026 봄학기 음원</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            /* 스크롤 다시 허용 */
            overflow-y: auto; 
            display: flex; justify-content: center; align-items: flex-start; /* 위에서부터 시작 */
            padding: 20px 10px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            width: 100%; 
            max-width: 600px;
            /* 높이 제한 해제 -> 목록 길게 나옴 */
            min-height: 90vh; 
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            padding-bottom: 30px;
        }

        /* 헤더 영역 (제목 + 플레이어) */
        .header-section {
            padding: 40px 30px 10px 30px;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 1.8em; margin-bottom: 5px;
        }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }

        .player-main {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 20px; padding: 25px; color: white;
            box-shadow: 0 10px 30px rgba(161, 140, 209, 0.4);
        }

        .now-playing { text-align: center; margin-bottom: 15px; }
        .now-playing h2 { font-size: 1.4em; margin-bottom: 5px; word-break: keep-all; line-height: 1.2; }
        
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255, 255, 255, 0.3);
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress { height: 100%; background: white; border-radius: 10px; width: 0%; }
        .time-display { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8em; opacity: 0.9; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin: 20px 0; }
        .control-btn {
            background: white; border: none; width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; color: #a18cd1; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.play { width: 70px; height: 70px; font-size: 2em; }

        /* 배속/볼륨 줄 맞춤 (Flexbox Grid) */
        .settings-container {
            display: flex; flex-direction: column; gap: 12px; margin-top: 15px;
        }
        .setting-row {
            display: flex; align-items: center; justify-content: center;
        }
        /* 라벨 너비 고정 */
        .setting-label {
            width: 45px; text-align: right; font-size: 0.9em; font-weight: bold; margin-right: 10px;
        }
        /* 슬라이더 */
        .setting-slider {
            flex: 1; /* 남은 공간 차지 */
            max-width: 150px; /* 너무 길어지지 않게 */
            accent-color: white; height: 5px; cursor: pointer;
        }
        /* 값 표시 너비 고정 */
        .setting-value {
            width: 35px; text-align: left; font-size: 0.9em; margin-left: 10px;
        }

        /* ★ 탭이 천장에 붙는 마법 (Sticky) ★ */
        .tabs {
            position: -webkit-sticky; /* 사파리 호환 */
            position: sticky;
            top: 0; /* 화면 맨 위에서 멈춤 */
            z-index: 1000; /* 목록보다 위에 뜨도록 */
            background: rgba(255, 255, 255, 0.98); /* 배경색을 줘서 목록이 비치지 않게 */
            
            display: flex; gap: 10px; padding: 15px 30px;
            border-bottom: 1px solid #eee;
            margin-top: 10px;
            
            /* 살짝 그림자 줘서 떠있는 느낌 */
            box-shadow: 0 5px 15px rgba(255,255,255, 1); 
        }

        /* 둥근 모서리 컨테이너 안에서 sticky가 잘 작동하도록 */
        @media (min-width: 600px) {
            .tabs { border-radius: 30px 30px 0 0; } /* PC 화면에서는 탭 윗부분도 둥글게 */
        }

        .tab-btn {
            flex: 1; padding: 12px; background: #f5f5f7; border: none;
            border-radius: 12px; /* 버튼 자체를 둥글게 */
            font-size: 1em; font-weight: bold; color: #999;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn.active { 
            background: #a18cd1; color: white; /* 활성화되면 보라색 배경 */
            box-shadow: 0 4px 10px rgba(161, 140, 209, 0.3);
        }

        /* 리스트 영역 */
        .playlist { padding: 20px 30px; }
        
        .song-item {
            background: white; border: 1px solid #eee; padding: 18px 20px; border-radius: 15px;
            margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .song-item:hover { background: #f9f9f9; transform: translateY(-2px); }
        
        .song-item.active { 
            background: rgba(161, 140, 209, 0.1); 
            border-color: #a18cd1; 
        }
        .song-item.active h3 { color: #a18cd1; font-weight: bold; }
        
        .song-info h3 { font-size: 1em; color: #333; margin-bottom: 4px; }
        .song-info p { font-size: 0.85em; color: #888; }

        .empty-playlist { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>🎵 2026 봄학기</h1>
            <p class="subtitle">Created by 줄래샘</p>

            <div class="player-main">
                <div class="now-playing">
                    <h2 id="currentTitle">파일을 선택하세요</h2>
                    <p id="currentArtist">-</p>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"><div class="progress" id="progress"></div></div>
                    <div class="time-display"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
                </div>

                <div class="controls">
                    <button class="control-btn" id="rewindBtn">-2</button>
                    <button class="control-btn play" id="playBtn">▶</button>
                    <button class="control-btn" id="forwardBtn">+12</button>
                </div>

                <div class="settings-container">
                    <div class="setting-row">
                        <span class="setting-label">⚡ 배속</span>
                        <input type="range" class="setting-slider" id="speedSlider" min="1.0" max="1.5" step="0.1" value="1.0">
                        <span class="setting-value" id="speedValue">1.0x</span>
                    </div>
                    <div class="setting-row">
                        <span class="setting-label">🔊 볼륨</span>
                        <input type="range" class="setting-slider" id="volumeSlider" min="0" max="100" value="70">
                        <span class="setting-value"></span> </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-category="실전모의고사">실전모의고사</button>
            <button class="tab-btn" data-category="리스닝">리스닝</button>
        </div>

        <div class="playlist" id="playlist"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        const songsByCategory = {
            "실전모의고사": [
                { title: "Week 2", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week2_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 3", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week3_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 4", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week4_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 5", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week5_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 6", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week6_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 7", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week7_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 8", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week8_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.mp3" }
            ],
            "리스닝": [
                { title: "Week 1 - 수능 미리보기", artist: "리스닝", file: "music/Listening/Week1_수능 미리보기.mp3" },
                { title: "Week 2 - 실전", artist: "리스닝", file: "music/Listening/Week2_실전모의고사.mp3" },
                { title: "Week 2 - 도표", artist: "리스닝", file: "music/Listening/Week2_유형편_도표.mp3" },
                { title: "Week 3 - 실전", artist: "리스닝", file: "music/Listening/Week3_실전모의고사.mp3" },
                { title: "Week 3 - 긴 대화의 응답", artist: "리스닝", file: "music/Listening/Week3_유형편_긴 대화의 응답.mp3" },
                { title: "Week 4 - 실전", artist: "리스닝", file: "music/Listening/Week4_실전모의고사.mp3" },
                { title: "Week 4 - 학교,가정 생활", artist: "리스닝", file: "music/Listening/Week4_유형편_학교,가정 생활.mp3" },
                { title: "Week 5 - 실전", artist: "리스닝", file: "music/Listening/Week5_실전모의고사.mp3" },
                { title: "Week 5 - 문화,사회 생활", artist: "리스닝", file: "music/Listening/Week5_유형편_문화,사회 생활.mp3" },
                { title: "Week 6 - 실전", artist: "리스닝", file: "music/Listening/Week6_실전모의고사.mp3" },
                { title: "Week 6 - 직장 생활", artist: "리스닝", file: "music/Listening/Week6_유형편_직장 생활.mp3" },
                { title: "Week 7 - 실전", artist: "리스닝", file: "music/Listening/Week7_실전모의고사.mp3" },
                { title: "Week 7 - 일상 생활", artist: "리스닝", file: "music/Listening/Week7_유형편_일상 생활.mp3" },
                { title: "Week 8 - 실전", artist: "리스닝", file: "music/Listening/Week8_실전모의고사.mp3" }
            ]
        };

        let currentCategory = "실전모의고사";
        let songs = songsByCategory[currentCategory];
        let currentSongIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playlistEl = document.getElementById('playlist');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const volumeSlider = document.getElementById('volumeSlider');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');

        audio.volume = 0.7;

        function displayPlaylist() {
            playlistEl.innerHTML = '';
            if (!songs) {
                playlistEl.innerHTML = '<div class="empty-playlist">목록이 비었습니다</div>';
                return;
            }
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `song-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `<div class="song-info"><h3>${song.title}</h3><p>${song.artist}</p></div><div class="song-duration">♪</div>`;
                item.onclick = () => loadSong(index);
                playlistEl.appendChild(item);
            });
        }

        function loadSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            audio.src = song.file;
            currentTitle.textContent = song.title;
            currentArtist.textContent = song.artist;
            displayPlaylist();
            if (isPlaying) audio.play();
        }

        function togglePlay() {
            if (!audio.src) loadSong(0);
            if (isPlaying) { audio.pause(); playBtn.textContent = '▶'; }
            else { audio.play(); playBtn.textContent = '⏸'; }
            isPlaying = !isPlaying;
        }

        playBtn.onclick = togglePlay;
        rewindBtn.onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 3); };
        forwardBtn.onclick = () => { if(audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 12); };
        
        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                progress.style.width = `${(audio.currentTime/audio.duration)*100}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
            audio.playbackRate = speedSlider.value;
        });
        audio.addEventListener('ended', () => {
            if(currentSongIndex < songs.length - 1) loadSong(currentSongIndex + 1);
        });

        progressBar.onclick = (e) => {
            if(audio.duration) audio.currentTime = (e.offsetX / progressBar.clientWidth) * audio.duration;
        };
        speedSlider.oninput = (e) => {
            audio.playbackRate = e.target.value;
            speedValue.textContent = e.target.value + 'x';
        };
        volumeSlider.oninput = (e) => { audio.volume = e.target.value / 100; };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                songs = songsByCategory[currentCategory];
                currentSongIndex = 0;
                isPlaying = false;
                playBtn.textContent = '▶';
                audio.pause();
                currentTitle.innerHTML = "파일을 선택하세요";
                currentArtist.textContent = "-";
                displayPlaylist();
            };
        });

        displayPlaylist();
    </script>
</body>
</html>
