<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 고등I 음원</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 반짝이는 배경 효과 */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 50px 50px, 80px 80px;
            background-position: 0 0, 40px 40px;
            animation: sparkle 20s linear infinite;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .player-main {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .now-playing {
            text-align: center;
            margin-bottom: 20px;
        }

        .now-playing h2 {
            font-size: 1.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .now-playing p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: white;
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.9em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .control-btn {
            background: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn.play {
            width: 80px;
            height: 80px;
            font-size: 2em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .volume-slider {
            width: 150px;
            height: 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .playlist {
            max-height: 400px;
            overflow-y: auto;
        }

        .playlist-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .song-item {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .song-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            border-color: #667eea;
        }

        .song-info h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 1.2em;
        }

        .song-info p {
            color: #666;
            font-size: 0.9em;
        }

        .song-duration {
            color: #667eea;
            font-weight: bold;
            font-size: 1.1em;
        }

        /* 스크롤바 스타일 */
        .playlist::-webkit-scrollbar {
            width: 8px;
        }

        .playlist::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        .empty-playlist {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-playlist p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
/* 탭 스타일 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 1.1em;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .controls {
                gap: 15px;
            }

            .control-btn {
                width: 50px;
                height: 50px;
            }

            .control-btn.play {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 고등I 음원</h1>
        <p class="subtitle">Created by YEP_Jule</p>

        <div class="player-main">
            <div class="now-playing">
                <h2 id="currentTitle">음원을<br>선택해주세요^-^</h2>
                <p id="currentArtist">-</p>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn">⏮</button>
                <button class="control-btn play" id="playBtn">▶</button>
                <button class="control-btn" id="nextBtn">⏭</button>
            </div>

            <div class="volume-control">
                <span>🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
            </div>
        </div>

       <div class="tabs">
            <button class="tab-btn active" data-category="실전모의고사">고등I_실모</button>
            <button class="tab-btn" data-category="리스닝교재">리스닝교재</button>
        </div>
        <div class="playlist" id="playlist">
            <div class="empty-playlist">
                <p>🎼</p>
                <p>아직 추가된 음원이 없어요</p>
                <p style="font-size: 0.9em; margin-top: 10px;">관리자가 음원을 추가해주세요!</p>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // 음원 목록을 카테고리별로 분류
        const songsByCategory = {
            "실전모의고사": [
                { title: "Week 2", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week2_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.MP3", category: "실전모의고사" },
                { title: "Week 3", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week3_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.MP3", category: "실전모의고사" },
                { title: "Week 4", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week4_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.MP3", category: "실전모의고사" },
                { title: "Week 5", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week5_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.MP3", category: "실전모의고사" },
                { title: "Week 6", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week6_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.MP3", category: "실전모의고사" },
                { title: "Week 7", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week7_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.MP3", category: "실전모의고사" },
                { title: "Week 8", artist: "고등영어", file: "music/실전모의고사/2026_겨울학기_week8_고등영어의 기술_실전모의고사(완성)_(MP3)_step.1.mp3", category: "실전모의고사" }
            ],
            "리스닝교재": [
                { title: "Week 2 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week2_실전모의고사1.mp3", category: "리스닝교재" },
                { title: "Week 2 - 실전모의고사 2", artist: "고등영어", file: "music/리스닝교재/Week2_실전모의고사2.mp3", category: "리스닝교재" },
                { title: "Week 3 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week3_실전모의고사1.mp3", category: "리스닝교재" },
                { title: "Week 3 - 실전모의고사 2", artist: "고등영어", file: "music/리스닝교재/Week3_실전모의고사2.mp3", category: "리스닝교재" },
                { title: "Week 4 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week4_실전모의고사1.mp3", category: "리스닝교재" },
                { title: "Week 4 - 실전모의고사 2", artist: "고등영어", file: "music/리스닝교재/Week4_실전모의고사2.mp3", category: "리스닝교재" },
                { title: "Week 5 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week5_실전모의고사1.mp3", category: "리스닝교재" },
                { title: "Week 5 - 실전모의고사 2", artist: "고등영어", file: "music/리스닝교재/Week5_실전모의고사2.mp3", category: "리스닝교재" },
                { title: "Week 6 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week6_실전모의고사1.mp3", category: "리스닝교재" },
                { title: "Week 6 - 실전모의고사 2", artist: "고등영어", file: "music/리스닝교재/Week6_실전모의고사2.mp3", category: "리스닝교재" },
                { title: "Week 7 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week7_실전모의고사1.mp3", category: "리스닝교재" },
                { title: "Week 7 - 실전모의고사 2", artist: "고등영어", file: "music/리스닝교재/Week7_실전모의고사2.mp3", category: "리스닝교재" },
                { title: "Week 8 - 실전모의고사 1", artist: "고등영어", file: "music/리스닝교재/Week8_실전모의고사.mp3", category: "리스닝교재" }
            ]
        };

        let currentCategory = "실전모의고사";
        let songs = songsByCategory[currentCategory];

        let currentSongIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const playlistEl = document.getElementById('playlist');

        // 초기 볼륨 설정
        audio.volume = 0.7;

        // 재생목록 표시
        function displayPlaylist() {
            if (songs.length === 0) {
                return;
            }

            playlistEl.innerHTML = '';
            songs.forEach((song, index) => {
                const songItem = document.createElement('div');
                songItem.className = 'song-item';
                if (index === currentSongIndex) {
                    songItem.classList.add('active');
                }
                songItem.innerHTML = `
                    <div class="song-info">
                        <h3>${song.title}</h3>
                        <p>${song.artist}</p>
                    </div>
                    <div class="song-duration">♪</div>
                `;
                songItem.onclick = () => loadSong(index);
                playlistEl.appendChild(songItem);
            });
        }

        // 곡 로드
        function loadSong(index) {
            if (songs.length === 0) return;
            
            currentSongIndex = index;
            const song = songs[currentSongIndex];
            audio.src = song.file;
            currentTitle.textContent = song.title;
            currentArtist.textContent = song.artist;
            displayPlaylist();
            
            if (isPlaying) {
                audio.play();
            }
        }

        // 재생/일시정지
        function togglePlay() {
            if (songs.length === 0) {
                alert('재생할 음원이 없어요! 😢');
                return;
            }

            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                if (!audio.src) {
                    loadSong(0);
                }
                audio.play();
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        // 이전 곡
        // 이전 곡
        function prevSong() {
            if (songs.length === 0) return;
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸';
        }

        // 다음 곡
        function nextSong() {
            if (songs.length === 0) return;
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸';
        }

        // 시간 포맷
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 이벤트 리스너
        playBtn.onclick = togglePlay;
        prevBtn.onclick = prevSong;
        nextBtn.onclick = nextSong;

        audio.addEventListener('timeupdate', () => {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progress.style.width = `${progressPercent}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            nextSong();
        });

        progressBar.addEventListener('click', (e) => {
            if (songs.length === 0) return;
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });

        // 초기화
        displayPlaylist();
        // 탭 전환 기능
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 모든 탭 비활성화
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                // 클릭한 탭 활성화
                btn.classList.add('active');
                
                // 카테고리 변경
                currentCategory = btn.dataset.category;
                songs = songsByCategory[currentCategory];
                
                // 재생 중이었으면 정지
                audio.pause();
                playBtn.textContent = '▶';
                isPlaying = false;
                
                // 첫 곡으로 리셋
                currentSongIndex = 0;
                currentTitle.innerHTML = '음원을 선택하세요';
                currentArtist.textContent = '-';
                
                // 재생목록 업데이트
                displayPlaylist();
            });
        });
    </script>
</body>
</html>
