<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 2026 봄학기 음원</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; padding: 40px; max-width: 800px; width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2.5em; margin-bottom: 10px;
        }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .player-main {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 20px; padding: 30px; margin-bottom: 30px; color: white;
            box-shadow: 0 10px 30px rgba(161, 140, 209, 0.4);
            position: sticky; top: 20px; z-index: 100;
        }
        .now-playing { text-align: center; margin-bottom: 20px; }
        .now-playing h2 { font-size: 1.5em; margin-bottom: 5px; word-break: keep-all; }
        .progress-bar {
            width: 100%; height: 8px; background: rgba(255, 255, 255, 0.3);
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress {
            height: 100%; background: white; border-radius: 10px; width: 0%;
        }
        .time-display { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9em; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .control-btn {
            background: white; border: none; width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.5em; color: #a18cd1; transition: transform 0.1s;
        }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.play { width: 80px; height: 80px; font-size: 2em; }
        
        .speed-control, .volume-control {
            display: flex; align-items: center; gap: 10px; margin-top: 15px; justify-content: center;
        }
        input[type=range] { width: 120px; accent-color: white; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
        .tab-btn {
            flex: 1; padding: 15px; background: transparent; border: none;
            border-bottom: 3px solid transparent; font-weight: bold; color: #999; cursor: pointer;
        }
        .tab-btn.active { color: #a18cd1; border-bottom-color: #a18cd1; }

        .playlist { max-height: 400px; overflow-y: auto; }
        .song-item {
            background: rgba(161, 140, 209, 0.1); padding: 15px; border-radius: 10px;
            margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .song-item:hover { background: rgba(161, 140, 209, 0.2); }
        .song-item.active { background: rgba(161, 140, 209, 0.4); border: 1px solid #a18cd1; }
        .song-info h3 { font-size: 1em; color: #333; margin-bottom: 3px; }
        .song-info p { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 2026 봄학기</h1>
        <p class="subtitle">Updated by 줄래샘</p>

        <div class="player-main">
            <div class="now-playing">
                <h2 id="currentTitle">재생할 파일을<br>선택해주세요</h2>
                <p id="currentArtist">-</p>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar"><div class="progress" id="progress"></div></div>
                <div class="time-display"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
            </div>

            <div class="controls">
                <button class="control-btn" id="rewindBtn" style="font-size: 14px; font-weight: bold;">-2</button>
                <button class="control-btn play" id="playBtn">▶</button>
                <button class="control-btn" id="forwardBtn" style="font-size: 14px; font-weight: bold;">+12</button>
            </div>

            <div class="speed-control">
                <span>⚡ 배속</span>
                <input type="range" id="speedSlider" min="1.0" max="1.5" step="0.1" value="1.0">
                <span id="speedValue">1.0x</span>
            </div>
            <div class="volume-control">
                <span>🔊 볼륨</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-category="실전모의고사">실전모의고사 (심화)</button>
            <button class="tab-btn" data-category="리스닝">리스닝 (유형편)</button>
        </div>
        <div class="playlist" id="playlist"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        // ★ 파일명 100% 일치 버전 (스크린샷 기반) ★
        const songsByCategory = {
            "실전모의고사": [
                { title: "Week 2 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week2_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 3 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week3_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 4 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week4_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 5 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week5_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 6 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week6_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 7 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week7_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.MP3" },
                { title: "Week 8 - 실전모의고사(심화)", artist: "고등영어", file: "music/실전모의고사_심화/2026_봄학기_week8_고등영어의 기술_실전모의고사(심화)_(MP3)_Step.2.mp3" }
            ],
            "리스닝": [
                { title: "Week 1 - 수능 미리보기", artist: "리스닝", file: "music/Listening/Week1_수능 미리보기.mp3" },
                
                { title: "Week 2 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week2_실전모의고사.mp3" },
                { title: "Week 2 - 유형편 (도표)", artist: "리스닝", file: "music/Listening/Week2_유형편_도표.mp3" },

                { title: "Week 3 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week3_실전모의고사.mp3" },
                { title: "Week 3 - 유형편 (긴 대화의 응답)", artist: "리스닝", file: "music/Listening/Week3_유형편_긴 대화의 응답.mp3" },
                
                { title: "Week 4 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week4_실전모의고사.mp3" },
                { title: "Week 4 - 유형편 (학교,가정 생활)", artist: "리스닝", file: "music/Listening/Week4_유형편_학교,가정 생활.mp3" },
                
                { title: "Week 5 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week5_실전모의고사.mp3" },
                { title: "Week 5 - 유형편 (문화,사회 생활)", artist: "리스닝", file: "music/Listening/Week5_유형편_문화,사회 생활.mp3" },
                
                { title: "Week 6 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week6_실전모의고사.mp3" },
                { title: "Week 6 - 유형편 (직장 생활)", artist: "리스닝", file: "music/Listening/Week6_유형편_직장 생활.mp3" },
                
                { title: "Week 7 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week7_실전모의고사.mp3" },
                { title: "Week 7 - 유형편 (일상 생활)", artist: "리스닝", file: "music/Listening/Week7_유형편_일상 생활.mp3" },
                
                { title: "Week 8 - 실전모의고사", artist: "리스닝", file: "music/Listening/Week8_실전모의고사.mp3" }
            ]
        };

        let currentCategory = "실전모의고사";
        let songs = songsByCategory[currentCategory];
        let currentSongIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playlistEl = document.getElementById('playlist');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const volumeSlider = document.getElementById('volumeSlider');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');

        audio.volume = 0.7;

        function displayPlaylist() {
            playlistEl.innerHTML = '';
            if (!songs) return;
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `song-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `<div class="song-info"><h3>${song.title}</h3><p>${song.artist}</p></div><div class="song-duration">♪</div>`;
                item.onclick = () => loadSong(index);
                playlistEl.appendChild(item);
            });
        }

        function loadSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            audio.src = song.file;
            currentTitle.textContent = song.title;
            currentArtist.textContent = song.artist;
            displayPlaylist();
            if (isPlaying) audio.play();
        }

        function togglePlay() {
            if (!audio.src) loadSong(0);
            if (isPlaying) { audio.pause(); playBtn.textContent = '▶'; }
            else { audio.play(); playBtn.textContent = '⏸'; }
            isPlaying = !isPlaying;
        }

        playBtn.onclick = togglePlay;
        rewindBtn.onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 3); };
        forwardBtn.onclick = () => { if(audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 12); };
        
        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                progress.style.width = `${(audio.currentTime/audio.duration)*100}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
            audio.playbackRate = speedSlider.value;
        });
        audio.addEventListener('ended', () => {
            if(currentSongIndex < songs.length - 1) loadSong(currentSongIndex + 1);
        });

        progressBar.onclick = (e) => {
            if(audio.duration) audio.currentTime = (e.offsetX / progressBar.clientWidth) * audio.duration;
        };
        speedSlider.oninput = (e) => {
            audio.playbackRate = e.target.value;
            speedValue.textContent = e.target.value + 'x';
        };
        volumeSlider.oninput = (e) => { audio.volume = e.target.value / 100; };

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                songs = songsByCategory[currentCategory];
                currentSongIndex = 0;
                isPlaying = false;
                playBtn.textContent = '▶';
                audio.pause();
                currentTitle.innerHTML = "파일을 선택해주세요";
                currentArtist.textContent = "-";
                displayPlaylist();
            };
        });

        displayPlaylist();
    </script>
</body>
</html>
